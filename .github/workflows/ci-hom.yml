---
name: CI - Hom

on:
  push:
    branches:
      - hom
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Docker Image (no push)
        run: |
          docker build \
            -t ms-video:${{ github.sha }} \
            .
